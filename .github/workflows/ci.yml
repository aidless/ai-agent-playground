name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/uv-action@v1
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Run tests
        run: uv run pytest -v

      - name: Check code style
        run: uv run ruff check .

      - name: Check types
        run: uv run mypy ai_agent_playground/

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/uv-action@v1
        with:
          enable-cache: true
      - run: uv sync
      - run: uv run ruff format --check .
      - run: uv run ruff check .

  build-docker:
    runs-on: ubuntu-latest
    needs: [test, lint]
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t ai-agent-playground:${{ github.sha }} .
      - name: Run container health check
        run: docker run -d --name test-app ai-agent-playground:${{ github.sha }} && sleep 5 && docker logs test-app