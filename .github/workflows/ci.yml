name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --locked
      - run: |
          uv run python -m pytest \
            --ignore=.hermes_test.py \
            --ignore=.run_test.py \
            --ignore=eval_harness \
            --tb=short -v \
            --junitxml=junit.xml
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: junit.xml

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --locked
      - run: uv run bandit -r agent/ ai_agent_playground/ scripts/ -ll 2>&1 || echo "bandit done"
      - run: uv run safety check 2>&1 || echo "safety done"

  build:
    needs: [test, security]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --locked
      - run: uv build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
