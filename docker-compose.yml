version: '3.9'

services:
  # ── Core Agent Service ──────────────────────────
  agent:
    build: .
    container_name: ai-agent-gateway
    env_file:
      - .env
    environment:
      - APP_ENV=production
    ports:
      - "8000:8000"
    volumes:
      - agent_logs:/app/logs
      - sandbox_data:/app/sandbox_workspace
      - tenant_data:/app/tenant_workspaces
      - memory_data:/app/memory
    restart: unless-stopped
    networks:
      - agent-net
    healthcheck:
      test: ["CMD", "uv", "run", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

  # ── Ollama (optional: cross-model review) ────────
  ollama:
    image: ollama/ollama:latest
    container_name: ai-agent-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    networks:
      - agent-net
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
    profiles:
      - full      # Only starts with: docker-compose --profile full up

  # ── ChromaDB (optional: RAG vector storage) ──────
  chromadb:
    image: chromadb/chroma:latest
    container_name: ai-agent-chromadb
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    restart: unless-stopped
    networks:
      - agent-net
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    profiles:
      - full

volumes:
  agent_logs:
  sandbox_data:
  tenant_data:
  memory_data:
  ollama_data:
  chroma_data:

networks:
  agent-net:
    driver: bridge
